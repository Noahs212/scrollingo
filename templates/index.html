<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrollingo - Douyin & TikTok Downloader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
  }

  .subtitle {
    color: #888;
    margin-bottom: 32px;
    font-size: 14px;
  }

  .input-hint {
    color: #555;
    font-size: 12px;
    margin-top: -24px;
    margin-bottom: 28px;
  }

  /* Input area */
  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }

  .input-group input {
    flex: 1;
    padding: 12px 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: #fe2c55;
  }

  .input-group input::placeholder {
    color: #666;
  }

  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: #fe2c55;
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.9; }

  .btn-download {
    background: #25f4ee;
    color: #000;
    padding: 8px 18px;
    font-size: 13px;
  }

  .btn-download:hover:not(:disabled) { opacity: 0.85; }

  .btn-download.done {
    background: #333;
    color: #888;
  }

  /* Status message */
  .status {
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    display: none;
  }

  .status.error {
    display: block;
    background: #2a1215;
    color: #ff6b6b;
    border: 1px solid #3a1a1d;
  }

  .status.info {
    display: block;
    background: #1a2332;
    color: #69b4ff;
    border: 1px solid #1a2d44;
  }

  /* Video cards */
  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .video-card {
    display: flex;
    gap: 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .video-card:hover {
    border-color: #444;
  }

  .video-thumb {
    width: 120px;
    height: 160px;
    border-radius: 6px;
    object-fit: cover;
    background: #222;
    flex-shrink: 0;
  }

  .video-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .video-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .video-author {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
  }

  .video-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #666;
    margin-bottom: 12px;
  }

  .video-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .download-status {
    font-size: 12px;
    color: #888;
  }

  /* Downloaded files */
  .downloads-section {
    margin-top: 40px;
  }

  .downloaded-file {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .downloaded-file .name {
    color: #ccc;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .downloaded-file .size {
    color: #666;
    margin-left: 12px;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: #555;
    padding: 40px 20px;
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #444;
    border-top-color: #fe2c55;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>Scrollingo</h1>
  <p class="subtitle">Douyin & TikTok Video Downloader</p>

  <div class="input-group">
    <input type="text" id="urlInput"
           placeholder="Paste a Douyin or TikTok link (e.g. https://v.douyin.com/xxx/ or https://vm.tiktok.com/xxx/)">
    <button class="btn btn-primary" id="parseBtn" onclick="parseUrl()">Parse</button>
  </div>
  <p class="input-hint">Paste the full share text from Douyin or TikTok — the link will be extracted automatically</p>

  <div id="statusMsg" class="status"></div>

  <div id="videosSection" style="display:none;">
    <p class="section-title">Videos</p>
    <div id="videosList"></div>
  </div>

  <div class="downloads-section">
    <p class="section-title">Downloaded</p>
    <div id="downloadsList">
      <div class="empty-state">No downloads yet</div>
    </div>
  </div>
</div>

<script>
const videos = [];

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function clearStatus() {
  document.getElementById('statusMsg').className = 'status';
}

async function parseUrl() {
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('parseBtn');
  const url = input.value.trim();
  if (!url) return;

  clearStatus();
  btn.disabled = true;
  btn.textContent = 'Parsing...';

  try {
    const resp = await fetch('/api/parse', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await resp.json();

    if (!resp.ok) {
      showStatus(data.error || 'Failed to parse URL', 'error');
      return;
    }

    // Check for duplicate
    if (videos.some(v => v.aweme_id === data.aweme_id)) {
      showStatus('Video already in list', 'info');
      return;
    }

    const index = videos.length;
    videos.push(data);
    renderVideos();
    input.value = '';

    // Auto-download immediately
    downloadVideo(index);
  } catch (e) {
    showStatus('Network error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Parse';
  }
}

function renderVideos() {
  const section = document.getElementById('videosSection');
  const list = document.getElementById('videosList');

  if (videos.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = videos.map((v, i) => `
    <div class="video-card" id="card-${i}">
      ${v.thumbnail
        ? `<img class="video-thumb" src="${v.thumbnail}" alt="thumbnail" referrerpolicy="no-referrer">`
        : `<div class="video-thumb"></div>`}
      <div class="video-info">
        <div>
          <div class="video-title">${escHtml(v.title)}</div>
          <div class="video-author">@${escHtml(v.author)}</div>
          <div class="video-stats">
            ${v.duration ? `<span>${v.duration}s</span>` : ''}
            ${v.likes ? `<span>${formatNum(v.likes)} likes</span>` : ''}
            ${v.comments ? `<span>${formatNum(v.comments)} comments</span>` : ''}
          </div>
        </div>
        <div class="video-actions">
          <button class="btn btn-download" id="dlbtn-${i}" onclick="downloadVideo(${i})">
            Download
          </button>
          <span class="download-status" id="dlstatus-${i}"></span>
        </div>
      </div>
    </div>
  `).join('');
}

async function downloadVideo(index) {
  const v = videos[index];
  const btn = document.getElementById('dlbtn-' + index);
  const status = document.getElementById('dlstatus-' + index);

  if (!v.video_url) {
    status.textContent = 'No video URL available';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Downloading...';

  try {
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        video_url: v.video_url,
        title: v.title,
        author: v.author,
        aweme_id: v.aweme_id,
        platform: v.platform || ''
      })
    });
    const data = await resp.json();

    if (!resp.ok) {
      status.textContent = data.error || 'Download failed';
      btn.disabled = false;
      btn.textContent = 'Retry';
      return;
    }

    if (data.status === 'exists') {
      status.textContent = 'Already downloaded';
    } else {
      status.textContent = `Saved (${data.size_mb} MB)`;
    }
    btn.textContent = 'Done';
    btn.className = 'btn btn-download done';
    loadDownloads();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

async function loadDownloads() {
  try {
    const resp = await fetch('/api/downloads');
    const files = await resp.json();
    const list = document.getElementById('downloadsList');

    if (files.length === 0) {
      list.innerHTML = '<div class="empty-state">No downloads yet</div>';
      return;
    }

    list.innerHTML = files.map(f => `
      <div class="downloaded-file">
        <span class="name">${escHtml(f.filename)}</span>
        <span class="size">${f.size_mb} MB</span>
      </div>
    `).join('');
  } catch (e) {
    // silently ignore
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function formatNum(n) {
  if (!n) return '0';
  if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
  return n.toLocaleString();
}

// Handle Enter key in input
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') parseUrl();
});

// Load existing downloads on page load
loadDownloads();
</script>
</body>
</html>
